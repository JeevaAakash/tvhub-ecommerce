<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Tv Hub.com</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary: #ff6b00;
      --primary-dark: #e05200;
      --accent: #2563eb;
      --bg: #f5f7fb;
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Poppins", sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at top left, rgba(255, 107, 0, 0.15) 0, transparent 55%),
        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.18) 0, transparent 55%),
        var(--bg);
      color: var(--text-main);
    }

    .register-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
    }

    .register-card {
      background: var(--card-bg);
      border-radius: 1.25rem;
      padding: 2.4rem 2.2rem 2rem;
      box-shadow: 0 22px 50px rgba(15, 23, 42, 0.12);
      border: 1px solid rgba(209, 213, 219, 0.8);
      animation: fadeInUp 0.4s ease-out;
    }

    .brand {
      text-align: center;
      margin-bottom: 1.4rem;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: radial-gradient(circle at top left, #ffd54a, var(--primary));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      color: #111827;
      margin-bottom: 0.4rem;
    }

    .brand-title {
      font-size: 1.35rem;
      font-weight: 600;
    }

    .brand-title span {
      color: var(--primary);
    }

    h2 {
      text-align: center;
      margin-bottom: 1.4rem;
      font-size: 1.1rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    input {
      padding: 0.75rem 0.85rem;
      border-radius: 0.75rem;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      box-shadow: 0 0 0 1.5px var(--accent);
      background: #ffffff;
      border-color: transparent;
    }

    button {
      margin-top: 0.4rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #ffffff;
      border: none;
      padding: 0.8rem 1rem;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 0 12px 28px rgba(248, 113, 22, 0.45);
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .login-link {
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
      color: var(--text-muted);
    }

    .login-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="register-wrapper">
    <div class="register-card">
      <div class="brand">
        <div class="brand-logo">TV</div>
        <div class="brand-title">Tv<span>Hub</span>.com</div>
      </div>

      <h2>Create Your Account</h2>

      <form id="registerForm">
        <input type="text" id="name" placeholder="Full Name" required />
        <input type="email" id="email" placeholder="Email Address" required />
        <input type="password" id="password" placeholder="Create Password" required />
        <button type="submit">Register</button>
      </form>

      <div class="login-link">
        Already have an account?
        <a href="LOGIN.html">Login here</a>
      </div>
    </div>
  </div>

 <script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {

  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  try {

    const response = await fetch("http://127.0.0.1:5000/api/auth/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: name,
        email: email,
        password: password
      })
    });

    // Check if server returned proper JSON
    const data = await response.json();

    console.log(data);

    if (response.ok) {

      alert(data.message || "User Registered Successfully");

      window.location.href = "LOGIN.html";

    } else {

      alert(data.message || "Registration Failed");

    }

  } catch (error) {

    console.log("REGISTER ERROR:", error);

    alert("Backend connection failed");

  }

});
</script>
</body>
</html>
