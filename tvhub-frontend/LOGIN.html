<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Tv Hub.com</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary: #ff6b00;
      --primary-dark: #e05200;
      --accent: #2563eb;
      --bg: #f5f7fb;
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at top left, rgba(255, 107, 0, 0.15) 0, transparent 55%),
        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.18) 0, transparent 55%),
        var(--bg);
      color: var(--text-main);
    }
    .login-wrapper { width: 100%; max-width: 420px; padding: 1.5rem; }
    .login-card {
      background: var(--card-bg);
      border-radius: 1.25rem;
      padding: 2.4rem 2.2rem 2rem;
      box-shadow: 0 22px 50px rgba(15, 23, 42, 0.12);
      border: 1px solid rgba(209, 213, 219, 0.8);
    }
    form { display: flex; flex-direction: column; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.25rem; }
    input {
      padding: 0.75rem 0.85rem;
      border-radius: 0.75rem;
      border: 1px solid #d1d5db;
      background: #f9fafb;
    }
    button {
      margin-top: 0.4rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #ffffff;
      border: none;
      padding: 0.8rem 1rem;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h2>Welcome Back</h2>
      <p>Login to access your wishlist, orders, and offers.</p>

      <!-- ✅ Changed form -->
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter your password" required />
        </div>

        <button type="submit">Login</button>
      </form>

      <div class="signup-link">
  Don’t have an account?
  <a href="register.html">Create one</a>
</div>
    </div>
  </div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {

    const response = await fetch("http://127.0.0.1:5000/api/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email,
        password: password
      })
    });

    const data = await response.json();

    alert(data.message);

    if (response.ok) {
  localStorage.setItem("userEmail", data.email);
  localStorage.setItem("userName", data.name);   
  window.location.href = "code.html";
}
  } catch (error) {
    console.log(error);
    alert("Server not responding");
  }

});
</script>

</body>
</html>
